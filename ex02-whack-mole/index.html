<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TP 2 — Tape la taupe</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0 auto;
    min-height: 100vh;
    max-width: 40rem;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: system-ui, sans-serif;
    text-align: center;
  }
  button { padding: 0.4rem 0.75rem; cursor: pointer; }
  .grille { display: grid; grid-template-columns: repeat(3, 4rem); gap: 6px; margin-top: 8px; }
  .case { width: 4rem; height: 4rem; border: 1px solid #333; display: grid; place-items: center; cursor: pointer; background: #eee; }
  .taupe { background: #f59e0b; }
</style>
</head>
<body>
  <h1>Mini-jeu : tape la taupe</h1>
  <p>
    <strong>Score : <span id="score">0</span></strong>
    <button type="button" id="start">Démarrer</button>
  </p>
  <div class="grille" id="grille"></div>

<script>
/* À toi : corrige les sélecteurs (#grille, #start, #score). */
const grid = document.querySelector('#grille');
const start = document.querySelector('#start');
const scoreEl = document.querySelector('#score');

let cells = [];
let score = 0;
let active = -1;
let loop = null;
let finPartie = null;


function build() {
  grid.innerHTML = '';
  cells = [] ;  
  for (let i = 0; i < 9; i++) { 
    let uneCase = document.createElement('div');
    uneCase.classList.add('case');
    grid.appendChild(uneCase);
    cells.push(uneCase);
    uneCase.addEventListener('click', function() {
  // Le code ici s'exécutera seulement quand on clique sur CETTE case précise
      if(i === active && active !== -1){
        score = score + 1;             // N'oublie pas d'augmenter le score !
        scoreEl.textContent = score;
        uneCase.classList.remove('taupe');
        active = -1;
      }
  });
  
    

  }
}

build();

start.addEventListener('click', function () {
  /* Étape 4 du README (4.1 → 4.4) : questions d’exploration puis blocs à compléter /
     corrige le bug — reset, setInterval, setTimeout ~10 s. loop et finPartie déjà déclarées. */
  if (loop !== null) {
    clearInterval(loop);
    loop = null; // Bonne pratique : on remet à null après avoir nettoyé
  }

  // On arrête la fin de partie programmée s'il existe
  if (finPartie !== null) {
    clearTimeout(finPartie);
    finPartie = null;
  }
  scoreEl.textContent = 0;
  score = 0;
  if (active !== -1 && cells[active]) {
    cells[active].classList.remove('taupe'); // On retire la couleur orange
  }

  // On remet l'indicateur à "aucune case"
  active = -1;
  loop = setInterval(function() {
    // 1. Retirer la taupe de la case précédente (si elle existe)
    if (active !== -1) {
      cells[active].classList.remove('taupe');
    }

    // 2. Choisir une nouvelle case au hasard (0 à 8)
    active = Math.floor(Math.random() * cells.length);

    // 3. Ajouter la classe 'taupe' à la nouvelle case
    cells[active].classList.add('taupe');
  }, 700);
  finPartie = setTimeout(function() {
    clearInterval(loop); // On arrête le chrono de mouvement
    alert("Temps écoulé ! Votre score : " + score);
    
    // Petit bonus : on cache la dernière taupe
    if (active !== -1) {
        cells[active].classList.remove('taupe');
        active = -1;
    }
  }, 10000);
});
</script>
</body>
</html>
