<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TP 1 — Compteur de clics (10 s)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0 auto;
    min-height: 100vh;
    max-width: 40rem;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: system-ui, sans-serif;
    text-align: center;
  }
  button { padding: 0.4rem 0.75rem; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
  <h1>Mini-jeu : clics en 10 secondes</h1>
  <p>Suis les étapes dans <strong>README.md</strong> (même dossier) et complète le script ci-dessous.</p>
  <p>
    <button type="button" id="demarrer">Démarrer</button>
    <button type="button" id="clic" disabled>Clique ici !</button>
    <span>Temps : <span id="temps">10</span> s</span>
    <strong>Score : <span id="score">0</span></strong>
  </p>

<script>
  const start = document.querySelector("#demarrer");
  const btn = document.querySelector("#clic");
  const timeEl = document.querySelector("#temps");
  const scoreEl = document.querySelector("#score");

  let time = 10;
  let score = 0;
  let timer = null;
  let running = false;

  // --- ÉTAPE 3 : Gestion du bouton "Démarrer" ---
  start.addEventListener("click", function () {
    // 3.1 — Sécurité : on vérifie si une partie est déjà lancée
    if (running) {
      console.log("Une partie est déjà en cours !");
      return; // On arrête la fonction ici
    }

    // 3.2 — Initialisation de la partie
    running = true;
    time = 10;
    score = 0;

    // Mise à jour de l'affichage (le texte sur la page)
    timeEl.textContent = String(time);
    scoreEl.textContent = String(score);

    // État des boutons
    btn.disabled = false;  // On active le bouton de clic
    start.disabled = true; // On grise le bouton démarrer

    // 3.3 — Le Minuteur (Lancement du compte à rebours)
    timer = setInterval(function () {
      time = time - 1; // On retire une seconde en mémoire
      timeEl.textContent = String(time); // On l'affiche

      // Condition de fin de partie
      if (time === 0) {
        // ARRÊT DU CHRONO : on utilise l'identifiant stocké dans 'timer'
        clearInterval(timer); 
        
        // Remise à l'état initial pour pouvoir rejouer
        btn.disabled = true;
        start.disabled = false;
        running = false;
        
        console.log("Fin de la partie !");
      }
    }, 1000); // 1000ms = 1 seconde
  });

  // --- ÉTAPE 4 : Clic sur le bouton de jeu ---
  btn.addEventListener("click", function () {
    // On n'augmente le score que si la partie est en cours
    if (running) {
      score = score + 1;
      scoreEl.textContent = String(score);
    }
  });

</script>
</body>
</html>
